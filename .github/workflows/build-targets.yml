name: Build Targets

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build-targets:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Schema validation
        run: |
          node -e "JSON.parse(require('fs').readFileSync('.claude-plugin/plugin.json','utf8')); JSON.parse(require('fs').readFileSync('.claude-plugin/marketplace.json','utf8')); JSON.parse(require('fs').readFileSync('hooks/hooks.json','utf8')); JSON.parse(require('fs').readFileSync('templates/settings.json','utf8')); console.log('Schema validation passed')"

      - name: Build target artifacts
        run: |
          rm -rf dist
          mkdir -p dist/claude-plugin dist/skills-cli dist/docs
          cp -R .claude-plugin/* dist/claude-plugin/
          cp -R skills/* dist/skills-cli/
          cp README.md README.zh-CN.md dist/docs/
          cp -R docs/* dist/docs/

      - name: Artifact diff check
        run: |
          git add -N dist
          if ! git diff --exit-code -- dist; then
            echo "Generated artifacts differ from committed snapshot."
            exit 1
          fi

      - name: Version consistency check
        run: |
          VERSION=$(node -e "const p=require('./.claude-plugin/plugin.json'); console.log(p.version)")
          echo "Plugin version: $VERSION"
          grep -q "$VERSION" CHANGELOG.md || (echo "CHANGELOG.md does not include version $VERSION" && exit 1)
