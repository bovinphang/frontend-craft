name: targets-manifest

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate-targets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Build targets from manifest
        run: node scripts/build-targets.mjs
      - name: Verify each manifest target has artifact
        run: node scripts/check-targets.mjs
