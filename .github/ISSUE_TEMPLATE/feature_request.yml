name: Feature request
description: Suggest a new runtime, agent, skill, command, hook, template, or documentation improvement.
title: "feat: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: What user need or workflow gap should this solve?
      placeholder: Describe the use case and who benefits from it.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What should frontend-craft add or change?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Runtime installer
        - Agent
        - Skill
        - Command
        - Hook
        - Template or rule
        - Documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Optional, but useful for larger changes.
  - type: checkboxes
    id: contribution
    attributes:
      label: Contribution
      options:
        - label: I am willing to open a pull request for this.
          required: false
